name: Compiler pipeline

on:
  workflow_dispatch:

jobs:
  compile:
    runs-on: windows-latest
    env:
      COMPILER_PATH: tools/nwn2_compiler/bin/NWNScriptCompiler.exe
      SOURCE_DIR: scripts/src
      STOCK_SCRIPTS_DIR: tools/nwn2_compiler/stock_scripts
      OUTPUT_DIR: artifacts/ncc
      # При необходимости можно переопределить через Variables/Env на уровне репозитория.
      # Реальные флаги NWNScriptCompiler (см. `NWNScriptCompiler -?`).
      CHECK_ARGS: '-c -a'
      OPTIMIZATION_ARGS: '-c -o'
      BUGFIND_ARGS: '-c -a -j'
      BUILD_ARGS: '-c'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run compiler modes (check -> optimization -> bugfind -> build)
        id: compile
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          if (-not (Test-Path $env:COMPILER_PATH)) {
            throw "Compiler not found: $env:COMPILER_PATH"
          }
          $compilerFullPath = (Resolve-Path $env:COMPILER_PATH).Path
          $compilerWorkingDir = Split-Path -Parent $compilerFullPath

          New-Item -ItemType Directory -Force -Path logs | Out-Null
          New-Item -ItemType Directory -Force -Path $env:OUTPUT_DIR | Out-Null
          $logsFullPath = (Resolve-Path logs).Path
          $outputFullPath = (Resolve-Path $env:OUTPUT_DIR).Path

          if (-not (Test-Path $env:SOURCE_DIR)) {
            throw "Source directory not found: $env:SOURCE_DIR"
          }
          if (-not (Test-Path $env:STOCK_SCRIPTS_DIR)) {
            throw "Stock scripts directory not found: $env:STOCK_SCRIPTS_DIR"
          }

          $script:sourceFiles = Get-ChildItem -Path $env:SOURCE_DIR -Filter '*.nss' -File -Recurse

          if (-not $script:sourceFiles -or $script:sourceFiles.Count -eq 0) {
            throw "No source scripts (*.nss) found in '$env:SOURCE_DIR'"
          }

          $modes = @(
            @{ Name = 'check';    Args = $env:CHECK_ARGS },
            @{ Name = 'optimization'; Args = $env:OPTIMIZATION_ARGS },
            @{ Name = 'bugfind';      Args = $env:BUGFIND_ARGS },
            @{ Name = 'build';    Args = $env:BUILD_ARGS }
          )

          $sourceIncludePath = (Resolve-Path $env:SOURCE_DIR).Path
          $stockIncludePath = (Resolve-Path $env:STOCK_SCRIPTS_DIR).Path

          function Invoke-Mode {
            param(
              [string]$ModeName,
              [string]$ModeArgs
            )

            $logFile = Join-Path $logsFullPath "$ModeName.log"
            $baseArgs = @()
            if ($ModeArgs) {
              $baseArgs += ($ModeArgs -split '\s+' | Where-Object { $_ -and $_.Trim() -ne '' })
            }
            $baseArgs += @('-i', $sourceIncludePath)
            $baseArgs += @('-i', $stockIncludePath)
            $baseArgs += @('-b', $outputFullPath)
            $exitCode = 0

            foreach ($sourceFile in $script:sourceFiles) {
              $args = @()
              $args += $baseArgs
              $args += $sourceFile.FullName

              "Running mode '$ModeName' for '$($sourceFile.FullName)' from '$compilerWorkingDir': $compilerFullPath $($args -join ' ')" | Tee-Object -FilePath $logFile -Append
              Push-Location $compilerWorkingDir
              try {
                & $compilerFullPath @args 2>&1 | Tee-Object -FilePath $logFile -Append
              } finally {
                Pop-Location
              }
              if ($LASTEXITCODE -ne 0) {
                $exitCode = $LASTEXITCODE
              }
            }

            if ($exitCode -ne 0) {
              $errorPattern = '(?i)(\berror\b|\bfatal\b|\bexception\b|ошибк|failed|\.nss\(\d+\))'
              $diagnosticLines = Get-Content -Path $logFile |
                Where-Object { $_.Trim() -ne '' -and $_ -notmatch '^Running mode' } |
                Select-Object -Last 200

              $errorLines = $diagnosticLines |
                Where-Object { $_ -match $errorPattern } |
                Select-Object -Unique |
                Select-Object -First 20 |
                ForEach-Object { "- $($_.Trim())" }

              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## ❌ Compiler failed on mode: $ModeName"
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "First 20 errors:"

              if ($errorLines.Count -gt 0) {
                Write-Host "Top 20 errors for mode '$ModeName':"
                $errorLines | ForEach-Object {
                  Write-Host $_
                  Write-Host "::error::$_"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $_
                }
              } else {
                $fallback = "- No explicit error-like lines were matched. Showing first 20 diagnostic lines from the failure log:"
                Write-Host $fallback
                Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $fallback
                $fallbackLines = $diagnosticLines |
                  Select-Object -Unique |
                  Select-Object -First 20 |
                  ForEach-Object { "- $($_.Trim())" }

                if ($fallbackLines.Count -gt 0) {
                  $fallbackLines | ForEach-Object {
                    Write-Host $_
                    Write-Host "::error::$_"
                    Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $_
                  }
                } else {
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Log file is empty."
                }
              }

              throw "Compilation failed in mode '$ModeName' with exit code $exitCode"
            }
          }

          foreach ($mode in $modes) {
            Invoke-Mode -ModeName $mode.Name -ModeArgs $mode.Args
          }

          if (-not (Get-ChildItem -Path $env:OUTPUT_DIR -Filter '*.ncs' -Recurse -ErrorAction SilentlyContinue)) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## ⚠️ Build finished but no *.ncs files were found in '$env:OUTPUT_DIR'."
            throw "No compiled scripts found (*.ncs)."
          }

          Compress-Archive -Path "$env:OUTPUT_DIR/*" -DestinationPath compiled-ncc-scripts.zip -Force
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## ✅ Compilation succeeded"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "Packed artifact: compiled-ncc-scripts.zip"

      - name: Upload compiler logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compiler-logs
          path: logs/
          if-no-files-found: warn

      - name: Upload compiled ncc archive
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: compiled-ncc-scripts
          path: compiled-ncc-scripts.zip
          if-no-files-found: error
